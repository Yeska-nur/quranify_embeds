<style>
  :root{ --bg:#fff; --gap:12px; --tile:clamp(128px,12.5vw,168px);
         --font:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden}
  .section{position:relative;width:100%;height:100vh;min-height:520px;overflow:hidden;background:var(--bg)}

  /* full-bleed marquee field */
  .marquee{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;justify-content:center;gap:var(--gap);
    -webkit-mask-image:linear-gradient(to right,transparent,#000 8%,#000 92%,transparent);
            mask-image:linear-gradient(to right,transparent,#000 8%,#000 92%,transparent)}
  .m-row{overflow:hidden;flex:none}
  .m-track{display:flex;gap:var(--gap);width:max-content;will-change:transform}
  .m-track.rev{animation-direction:reverse}
  @keyframes scrollX{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .m-track{animation:scrollX var(--dur,90s) linear infinite}
  .m-tile{width:var(--tile);aspect-ratio:1/1;flex:none;border-radius:2px;
          background-size:cover;background-position:center;background-color:#e9eef3}

  /* fade field into the page top & bottom too */
  .vfade{position:absolute;inset:0;z-index:3;pointer-events:none;
    background:linear-gradient(to bottom,#fff 0%,rgba(255,255,255,0) 15%,rgba(255,255,255,0) 85%,#fff 100%)}

  /* centre glass card — exact Figma (hug ~369x247) */
  .card{position:absolute;z-index:4;left:50%;top:50%;transform:translate(-50%,-50%) scale(.97);
    width:fit-content;max-width:calc(100% - 40px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
    padding:40px 64px;border-radius:24px;
    background:rgba(255,255,255,.04);backdrop-filter:blur(33px);-webkit-backdrop-filter:blur(33px);
    box-shadow:0 4px 16px rgba(0,0,0,.08);text-align:center;opacity:0;
    transition:opacity .8s ease .35s,transform .8s cubic-bezier(.22,1,.36,1) .35s}
  .card.shown{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .card .heading{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%}
  .card h2{font-size:32px;font-weight:500;letter-spacing:-.32px;line-height:1.6;white-space:nowrap;
    font-variant-numeric:tabular-nums;text-shadow:0 1px 10px rgba(0,0,0,.22)}
  .card p{font-size:18px;font-weight:400;line-height:28px;opacity:.6;white-space:nowrap;text-shadow:0 1px 8px rgba(0,0,0,.18)}
  .card .btn{display:inline-flex;align-items:center;justify-content:center;gap:50px;width:235px;
    padding:15px 20px;border:none;border-radius:980px;background:#fff;color:#000;font-family:var(--font);
    font-size:16px;font-weight:400;cursor:pointer;transition:transform .2s cubic-bezier(.22,1,.36,1),box-shadow .2s ease}
  .card .btn:hover{transform:scale(1.03);box-shadow:0 12px 38px rgba(90,110,160,.28)}
  .card .btn:active{transform:scale(.99)}
  .card .btn svg{width:24px;height:12px;flex:none}

  /* mobile: smaller tiles, compact hug card, text wraps */
  @media (max-width:760px){
    :root{ --tile:clamp(96px,29vw,124px); --gap:10px; }
    .section{min-height:100vh}
    .card{padding:28px 30px;gap:18px;border-radius:22px;max-width:calc(100% - 28px)}
    .card .heading{gap:12px}
    .card h2{font-size:24px;white-space:nowrap}
    .card p{font-size:14.5px;line-height:21px;white-space:normal}
    .card .btn{width:200px;gap:28px;padding:13px 18px}
    .marquee{-webkit-mask-image:linear-gradient(to right,transparent,#000 4%,#000 96%,transparent);
             mask-image:linear-gradient(to right,transparent,#000 4%,#000 96%,transparent)}
  }
  @media (max-width:400px){ :root{ --tile:clamp(82px,30vw,108px) } .card h2{font-size:22px} }

  @media (prefers-reduced-motion:reduce){ .m-track{animation:none} .bg-glow{animation:none} .card{transition-duration:.001s} }

  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const shuffle=(a)=>{for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
  const url=(u)=>'url("'+u+'")';
  const marquee=document.getElementById('marquee');

  // SLOW, varied durations cycled across rows (higher = slower)
  const DURS=[88,108,76,98,120,82,104];

  function tilePx(){
    const probe=document.createElement('div'); probe.style.width='var(--tile)';
    probe.style.position='absolute'; probe.style.visibility='hidden'; document.body.appendChild(probe);
    const w=probe.getBoundingClientRect().width||140; probe.remove(); return w;
  }
  function gapPx(){ return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))||12; }

  // build as many rows as needed to fill the viewport height
  function build(){
    marquee.innerHTML='';
    const t=tilePx(), g=gapPx();
    const rows=3;
    for(let r=0;r<rows;r++){
      const row=document.createElement('div'); row.className='m-row';
      const track=document.createElement('div'); track.className='m-track'+(r%2?' rev':'');
      track.style.setProperty('--dur',DURS[r%DURS.length]+'s');
      const pool=shuffle([...FACES,...FACES,...FACES]).slice(0,14);
      [...pool,...pool].forEach(src=>{ const ti=document.createElement('div'); ti.className='m-tile'; ti.style.backgroundImage=url(src); track.appendChild(ti); });
      row.appendChild(track); marquee.appendChild(row);
    }
  }

  const countEl=document.getElementById('count');
  function countUp(){
    if(reduce){ countEl.textContent='100'; return; }
    const t0=performance.now(),dur=1500,ease=x=>1-Math.pow(1-x,3);
    (function step(n){const p=Math.min(1,(n-t0)/dur);countEl.textContent=Math.round(ease(p)*100);if(p<1)requestAnimationFrame(step);})(t0);
  }

  let rt;
  window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(build,200); });
  function start(){ build(); document.getElementById('card').classList.add('shown'); countUp(); }
  if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(start);} else { window.addEventListener('load',start);}
</script>
</body></html>
